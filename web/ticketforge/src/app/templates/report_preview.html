<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ report.name }} Preview</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-950 text-slate-100">
  <main class="mx-auto max-w-4xl px-5 py-8">
    <header class="mb-4 rounded-2xl border border-cyan-400/30 bg-slate-900/70 px-5 py-4">
      <h1 class="text-2xl font-bold text-cyan-100">{{ report.name }} · Preview</h1>
    </header>
    <section class="rounded-2xl border border-cyan-400/25 bg-slate-900/50 p-5">
      {{ content|safe }}
    </section>
  </main>
</body>
</html>
