<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Legacy Access Portal{% endblock %}</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Courier New', monospace;
            background: #0d0d0d;
            color: #c8c8c8;
            min-height: 100vh;
        }
        header {
            background: #111;
            border-bottom: 1px solid #333;
            padding: 12px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        header .logo {
            color: #00ff88;
            font-size: 1.1rem;
            font-weight: bold;
            letter-spacing: 2px;
        }
        header nav a {
            color: #888;
            text-decoration: none;
            margin-left: 20px;
            font-size: 0.9rem;
        }
        header nav a:hover { color: #00ff88; }
        .container {
            max-width: 860px;
            margin: 48px auto;
            padding: 0 20px;
        }
        .card {
            background: #161616;
            border: 1px solid #2a2a2a;
            border-radius: 6px;
            padding: 32px;
        }
        h1, h2 { color: #e0e0e0; margin-bottom: 18px; }
        h1 { font-size: 1.4rem; border-bottom: 1px solid #2a2a2a; padding-bottom: 12px; }
        label { display: block; color: #888; margin-bottom: 6px; font-size: 0.85rem; }
        input[type=text], input[type=password] {
            width: 100%;
            background: #0d0d0d;
            border: 1px solid #333;
            color: #e0e0e0;
            padding: 10px 14px;
            border-radius: 4px;
            margin-bottom: 18px;
            font-family: inherit;
            font-size: 0.95rem;
        }
        input:focus { outline: none; border-color: #00ff88; }
        .btn {
            background: #00ff88;
            color: #0d0d0d;
            border: none;
            padding: 10px 28px;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
            font-size: 0.95rem;
        }
        .btn:hover { background: #00cc6a; }
        .error {
            background: #1a0000;
            border: 1px solid #550000;
            color: #ff6666;
            padding: 10px 16px;
            border-radius: 4px;
            margin-bottom: 18px;
            font-size: 0.9rem;
        }
        .info {
            background: #001a0d;
            border: 1px solid #005533;
            color: #00ff88;
            padding: 10px 16px;
            border-radius: 4px;
            margin-bottom: 18px;
            font-size: 0.9rem;
        }
        a { color: #00aa55; }
        a:hover { color: #00ff88; }
        .field-row { margin-bottom: 14px; }
        .field-label { color: #555; font-size: 0.8rem; margin-bottom: 2px; }
        .field-value { color: #e0e0e0; padding: 8px 12px; background: #0d0d0d; border-radius: 4px; border: 1px solid #222; word-break: break-all; }
        pre {
            background: #0d0d0d;
            border: 1px solid #2a2a2a;
            padding: 16px;
            border-radius: 4px;
            overflow-x: auto;
            color: #00ff88;
            font-size: 0.85rem;
            margin-top: 14px;
        }
        footer {
            text-align: center;
            color: #333;
            font-size: 0.75rem;
            padding: 32px;
        }
    </style>
</head>
<body>
<header>
    <span class="logo">[ LEGACY ACCESS PORTAL ]</span>
    <nav>
        {% if session.get('user_id') %}
            <a href="{{ url_for('dashboard') }}">Boshqaruv paneli</a>
            <a href="{{ url_for('logout') }}">Chiqish</a>
        {% else %}
            <a href="{{ url_for('login') }}">Kirish</a>
            <a href="{{ url_for('register') }}">Ro'yxatdan o'tish</a>
        {% endif %}
    </nav>
</header>

<div class="container">
    {% block content %}{% endblock %}
</div>

<footer>
    &copy; 2019 Legacy Systems Inc. — Tizim barqaror ishlaydi.
</footer>
</body>
</html>
