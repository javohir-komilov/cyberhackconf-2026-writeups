{% extends "base.html" %}
{% block title %}Kirish — Legacy Access Portal{% endblock %}
{% block content %}
<div class="card" style="max-width:440px; margin:0 auto;">
    <h1>Tizimga kirish</h1>
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
    <form method="POST">
        <div>
            <label>Foydalanuvchi nomi</label>
            <input type="text" name="username" autocomplete="off" required>
        </div>
        <div>
            <label>Parol</label>
            <input type="password" name="password" required>
        </div>
        <button type="submit" class="btn">Kirish</button>
    </form>
    <p style="margin-top:20px; color:#555; font-size:0.85rem;">
        Hisobingiz yo'qmi? <a href="{{ url_for('register') }}">Ro'yxatdan o'ting</a>
    </p>
    <p style="margin-top:10px; color:#333; font-size:0.8rem;">
        Sinov hisobi: <code>student</code> / <code>student123</code>
    </p>
</div>
{% endblock %}
