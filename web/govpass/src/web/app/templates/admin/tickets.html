<!DOCTYPE html>
<html>
<head>
  <title>Application Search — GovPass Admin</title>
  <style>body{font-family:sans-serif;padding:1em} iframe{width:100%;height:110px;border:1px solid #ddd;margin:4px 0;display:block}</style>
</head>
<body>
  <h4>GovPass Admin &mdash; Application Search{% if ref %} &mdash; filter: <code>{{ ref }}</code>{% endif %} &mdash; {{ applications|length }} result(s)</h4>
  {% for app in applications %}
  <iframe src="/admin/ticket/{{ app.id }}"></iframe>
  {% endfor %}
  {% if not applications %}
  <p style="color:#888">No matching applications.</p>
  {% endif %}
</body>
</html>
