services:
  web:
    build: ./web
    ports:
      - "5000:5000"
    environment:
      - FLAG=CHC{fr4m3_c0unt_l34ks_4ll_s3cr3ts}
      - SECRET_KEY=aeba8bd28ce6de02042f72e1c3215367217b0095874de937ad35a64524093657
      - ADMIN_PASSWORD=V3ryS3cur3P4ssw0rd!
    networks:
      - internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.0"

  bot:
    build: ./bot
    environment:
      - PORTAL_URL=http://web:5000
      - ADMIN_PASSWORD=V3ryS3cur3P4ssw0rd!
      - POLL_INTERVAL=5
    networks:
      - internal
    depends_on:
      web:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.5"

networks:
  internal:
    driver: bridge
