<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ro'yxatdan O'tish — VaultPass</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/static/css/main.css}" rel="stylesheet">
</head>
<body class="vp-auth-page">

    <div class="vp-auth-container" style="max-width:480px;">
        <div class="text-center mb-4">
            <a href="/" class="vp-auth-brand">
                <i class="bi bi-shield-lock-fill"></i>
                <span>VaultPass</span>
            </a>
            <h4 class="mt-3 vp-auth-title">Seyfingizni yarating</h4>
            <p class="vp-auth-sub">Doimo bepul. Kredit karta talab etilmaydi.</p>
        </div>

        <div th:if="${error}" class="alert vp-alert-danger d-flex align-items-center gap-2">
            <i class="bi bi-exclamation-circle-fill"></i>
            <span th:text="${error}"></span>
        </div>

        <div class="vp-auth-card">
            <form th:action="@{/register}" method="post">
                <div class="mb-3">
                    <label for="username" class="form-label vp-label">Foydalanuvchi nomi</label>
                    <div class="input-group vp-input-group">
                        <span class="input-group-text"><i class="bi bi-person"></i></span>
                        <input type="text" class="form-control vp-input" id="username"
                               name="username" placeholder="foydalanuvchi_nomi"
                               required autofocus minlength="3" maxlength="50"
                               autocomplete="username">
                    </div>
                </div>
                <div class="mb-3">
                    <label for="email" class="form-label vp-label">Elektron pochta</label>
                    <div class="input-group vp-input-group">
                        <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                        <input type="email" class="form-control vp-input" id="email"
                               name="email" placeholder="siz@misol.uz"
                               required autocomplete="email">
                    </div>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label vp-label">Asosiy Parol</label>
                    <div class="input-group vp-input-group">
                        <span class="input-group-text"><i class="bi bi-key"></i></span>
                        <input type="password" class="form-control vp-input" id="password"
                               name="password" placeholder="Kamida 8 ta belgi"
                               required minlength="8" autocomplete="new-password">
                        <button class="input-group-text vp-toggle-pass" type="button"
                                onclick="togglePassword('password')">
                            <i class="bi bi-eye" id="password-eye"></i>
                        </button>
                    </div>
                    <div class="vp-password-strength mt-1" id="strength-bar"></div>
                </div>
                <div class="mb-4">
                    <label for="confirmPassword" class="form-label vp-label">Parolni Tasdiqlash</label>
                    <div class="input-group vp-input-group">
                        <span class="input-group-text"><i class="bi bi-key-fill"></i></span>
                        <input type="password" class="form-control vp-input" id="confirmPassword"
                               name="confirmPassword" placeholder="••••••••"
                               required minlength="8" autocomplete="new-password">
                    </div>
                </div>
                <button type="submit" class="btn vp-btn-primary w-100">
                    <i class="bi bi-shield-plus me-2"></i>Seyf Yaratish
                </button>
            </form>
        </div>

        <p class="text-center mt-3 vp-auth-footer">
            Allaqachon hisobingiz bormi? <a href="/login" class="vp-link">Kirish</a>
        </p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/static/js/main.js}"></script>
</body>
</html>
