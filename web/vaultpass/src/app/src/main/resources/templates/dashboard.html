<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mening Seyfim — VaultPass</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/static/css/main.css}" rel="stylesheet">
</head>
<body class="vp-app">

<nav class="vp-app-navbar">
    <div class="container-fluid px-3">
        <a class="vp-app-brand" href="/dashboard">
            <i class="bi bi-shield-lock-fill"></i>VaultPass
        </a>
        <div class="ms-auto d-flex align-items-center gap-2">
            <span class="vp-user-badge">
                <i class="bi bi-person-circle"></i>
                <span th:text="${username}">user</span>
                <span th:if="${isAdmin}" class="vp-admin-chip">ADMIN</span>
            </span>
            <a href="/logout" class="btn btn-sm vp-btn-ghost">
                <i class="bi bi-box-arrow-right me-1"></i>Chiqish
            </a>
        </div>
    </div>
</nav>

<div class="vp-app-body">
    <!-- Yon panel -->
    <div class="vp-sidebar" style="width:200px; min-width:200px;">
        <nav class="vp-sidenav">
            <a href="/dashboard" class="vp-sidenav-item active">
                <i class="bi bi-grid-fill"></i><span>Mening Seyfim</span>
            </a>
            <a href="/profile" class="vp-sidenav-item">
                <i class="bi bi-person-gear"></i><span>Sozlamalar</span>
            </a>
            <a href="/import" class="vp-sidenav-item">
                <i class="bi bi-cloud-upload"></i><span>Import</span>
            </a>
            <hr class="vp-sidenav-divider">
            <a href="/logout" class="vp-sidenav-item vp-sidenav-logout">
                <i class="bi bi-box-arrow-right"></i><span>Chiqish</span>
            </a>
        </nav>
    </div>

    <!-- Asosiy kontent -->
    <div class="vp-main-content" style="flex:1;">

        <div class="vp-page-header d-flex align-items-center justify-content-between">
            <div>
                <div class="vp-page-title">
                    <i class="bi bi-shield-lock me-2" style="color:var(--accent);"></i>Mening Seyfim
                </div>
                <p class="vp-page-sub mb-0">
                    <span th:text="${#lists.size(entries)}">0</span> ta yozuv saqlangan
                </p>
            </div>
            <button class="btn vp-btn-primary" data-bs-toggle="modal" data-bs-target="#addEntryModal">
                <i class="bi bi-plus-lg me-1"></i>Yozuv Qo'shish
            </button>
        </div>

        <!-- Bo'sh holat -->
        <div th:if="${#lists.isEmpty(entries)}" class="vp-empty-state">
            <i class="bi bi-safe2 vp-empty-icon"></i>
            <h5 style="color:var(--text); font-weight:600;">Seyfingiz bo'sh</h5>
            <p class="mt-1" style="font-size:13px;">Boshlash uchun birinchi ma'lumotingizni qo'shing.</p>
            <button class="btn vp-btn-primary mt-3" data-bs-toggle="modal" data-bs-target="#addEntryModal">
                <i class="bi bi-plus-lg me-1"></i>Birinchi Yozuv Qo'shish
            </button>
        </div>

        <!-- Yozuvlar -->
        <div th:unless="${#lists.isEmpty(entries)}" class="row g-3 mt-1">
            <div th:each="entry : ${entries}" class="col-xl-4 col-lg-6 col-md-6">
                <div class="vp-entry-card">
                    <div class="d-flex align-items-start justify-content-between mb-3">
                        <div class="d-flex align-items-center gap-2">
                            <div class="vp-entry-favicon">
                                <i class="bi bi-globe2"></i>
                            </div>
                            <div style="min-width:0;">
                                <div class="vp-entry-site" th:text="${entry.site_name}">Sayt</div>
                                <div class="vp-entry-url" th:text="${entry.site_url}" style="max-width:160px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">url</div>
                            </div>
                        </div>
                        <form th:action="@{/vault/delete/{id}(id=${entry.id})}" method="post">
                            <button type="submit" class="vp-btn-delete"
                                    onclick="return confirm('Bu yozuvni o\'chirasizmi?')">
                                <i class="bi bi-trash3"></i>
                            </button>
                        </form>
                    </div>
                    <div class="vp-entry-field mb-2">
                        <span class="vp-entry-label">Login</span>
                        <span class="vp-entry-value" th:text="${entry.vault_username}">–</span>
                    </div>
                    <div class="vp-entry-field">
                        <span class="vp-entry-label">Parol</span>
                        <span class="vp-entry-value vp-masked" id="pass-[[${entry.id}]]"
                              th:attr="data-real=${entry.vault_password}">••••••••</span>
                        <button class="vp-reveal-btn" onclick="toggleReveal('pass-[[${entry.id}]]')">
                            <i class="bi bi-eye-slash" id="eye-[[${entry.id}]]"></i>
                        </button>
                    </div>
                    <div th:if="${entry.notes}" class="vp-entry-notes mt-2"
                         th:text="${entry.notes}"></div>
                </div>
            </div>
        </div>

    </div>
</div>

<!-- Yozuv qo'shish modali -->
<div class="modal fade" id="addEntryModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content vp-modal">
            <div class="modal-header vp-modal-header">
                <h5 class="modal-title"><i class="bi bi-plus-circle me-2"></i>Seyfga Yozuv Qo'shish</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <form th:action="@{/vault/add}" method="post">
                <div class="modal-body p-4">
                    <div class="mb-3">
                        <label class="vp-label">Sayt nomi <span class="text-danger">*</span></label>
                        <input type="text" class="form-control vp-input" name="siteName"
                               placeholder="masalan: GitHub" required>
                    </div>
                    <div class="mb-3">
                        <label class="vp-label">URL manzil</label>
                        <input type="text" class="form-control vp-input" name="siteUrl"
                               placeholder="https://...">
                    </div>
                    <div class="mb-3">
                        <label class="vp-label">Foydalanuvchi nomi / Elektron pochta</label>
                        <input type="text" class="form-control vp-input" name="vaultUsername"
                               placeholder="foydalanuvchi@misol.uz">
                    </div>
                    <div class="mb-3">
                        <label class="vp-label">Parol</label>
                        <div class="vp-input-group">
                            <input type="password" class="form-control vp-input" name="vaultPassword"
                                   id="newEntryPassword" placeholder="••••••••">
                            <button class="vp-toggle-pass" type="button"
                                    onclick="togglePassword('newEntryPassword')">
                                <i class="bi bi-eye" id="newEntryPassword-eye"></i>
                            </button>
                        </div>
                    </div>
                    <div class="mb-1">
                        <label class="vp-label">Izohlar</label>
                        <textarea class="form-control vp-input" name="notes"
                                  rows="2" placeholder="Ixtiyoriy..."></textarea>
                    </div>
                </div>
                <div class="modal-footer vp-modal-footer">
                    <button type="button" class="btn vp-btn-ghost" data-bs-dismiss="modal">Bekor qilish</button>
                    <button type="submit" class="btn vp-btn-primary">
                        <i class="bi bi-plus me-1"></i>Qo'shish
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<footer class="vp-footer">
    Powered by <a href="https://t.me/JavaSecuz" target="_blank" rel="noopener">JavaSec</a>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/static/js/main.js}"></script>
</body>
</html>
