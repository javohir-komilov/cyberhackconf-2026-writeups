spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/vaultpass}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:vaultpass_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:vaultpass_db_pass_2024}
spring.datasource.driver-class-name=org.postgresql.Driver

# Disable Spring Boot auto-DDL (schema is managed by init.sql)
spring.sql.init.mode=never

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Server
server.port=8080
server.servlet.session.timeout=3600s

# Show full error details in responses (intentional for error-based SQLi)
server.error.include-message=always
server.error.include-exception=true
server.error.include-stacktrace=always
spring.mvc.throw-exception-if-no-handler-found=false

# Uploads directory (served as static files - accessible after RCE)
vaultpass.uploads.dir=/vaultpass_uploads
